name: Screenshot compare comment

on:
  workflow_run:
    workflows: [CompareScreenshot]
    types: [completed]

permissions: {}

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
      pull-requests: write

    steps:
      - name: Download PR number
        uses: dawidd6/action-download-artifact@v6
        with:
          name: pr
          run_id: ${{ github.event.workflow_run.id }}

      - name: Read PR number
        id: pr
        run: echo "number=$(cat pr_number.txt)" >> $GITHUB_OUTPUT

      - name: Download screenshot diff
        uses: dawidd6/action-download-artifact@v6
        with:
          name: screenshot-diff
          path: screenshot-diff
          run_id: ${{ github.event.workflow_run.id }}

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get branch name from PR
        id: branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }}
            });
            const branchName = pr.data.head.ref.replace(/[^a-zA-Z0-9_-]/g, '_');
            core.setOutput('name', branchName);

      - name: Create companion branch
        run: |
          git checkout --orphan companion_${{ steps.branch.outputs.name }}
          git rm -rf .

      - name: Copy compare images to companion branch
        run: |
          mkdir -p screenshots
          find screenshot-diff -name "*_compare.png" -exec cp {} screenshots/ \; 2>/dev/null || true
          ls -la screenshots/ || echo "No compare images found"

      - name: Commit and push companion branch
        run: |
          if [ -n "$(ls -A screenshots 2>/dev/null)" ]; then
            git add screenshots/
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Add screenshot comparison images for PR #${{ steps.pr.outputs.number }}"
            git push origin companion_${{ steps.branch.outputs.name }} --force
          else
            echo "No compare images to commit"
          fi

      - name: Generate markdown table
        id: markdown
        run: |
          BRANCH="companion_${{ steps.branch.outputs.name }}"
          REPO="${{ github.repository }}"

          if [ -n "$(ls -A screenshots 2>/dev/null)" ]; then
            echo "## Screenshot Comparison" > comment.md
            echo "" >> comment.md
            echo "| Image | Comparison |" >> comment.md
            echo "|-------|------------|" >> comment.md

            for file in screenshots/*_compare.png; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                # Extract test name from filename (remove _compare.png suffix)
                testname="${filename%_compare.png}"
                echo "| $testname | ![comparison](https://raw.githubusercontent.com/$REPO/$BRANCH/screenshots/$filename) |" >> comment.md
              fi
            done
          else
            echo "## Screenshot Comparison" > comment.md
            echo "" >> comment.md
            echo "No screenshot differences detected." >> comment.md
          fi

          echo "" >> comment.md
          echo "_Generated by [Roborazzi](https://github.com/takahirom/roborazzi)_" >> comment.md

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Screenshot Comparison

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: comment.md
          edit-mode: replace

      - name: Cleanup old companion branches
        run: |
          # Delete companion branches older than 30 days
          git fetch --prune origin

          for branch in $(git branch -r | grep 'origin/companion_' | sed 's/origin\///'); do
            # Get the last commit date
            last_commit_date=$(git log -1 --format="%ci" "origin/$branch" 2>/dev/null || echo "")
            if [ -n "$last_commit_date" ]; then
              # Calculate days since last commit
              last_commit_ts=$(date -d "$last_commit_date" +%s 2>/dev/null || date -j -f "%Y-%m-%d %H:%M:%S %z" "$last_commit_date" +%s 2>/dev/null || echo "0")
              current_ts=$(date +%s)
              days_old=$(( (current_ts - last_commit_ts) / 86400 ))

              if [ "$days_old" -gt 30 ]; then
                echo "Deleting old branch: $branch (${days_old} days old)"
                git push origin --delete "$branch" || true
              fi
            fi
          done
