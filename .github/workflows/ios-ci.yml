name: iOS CI

on:
  pull_request:
    paths:
      - 'iosApp/**'
      - 'composeApp/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: iOS ビルド検証
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: JDK セットアップ
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Gradle キャッシュ
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Xcode バージョン選択
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: iOS ビルド検証
        working-directory: iosApp
        run: |
          xcodebuild build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
