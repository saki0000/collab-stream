name: CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-coverage:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-home-cache-cleanup: true

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.konan
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test --continue

    - name: Generate coverage reports
      run: ./gradlew koverXmlReport koverHtmlReport


    - name: Generate coverage comment
      run: ./gradlew generateCoverageComment

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      run: |
        if [ -f build/coverage-comment.md ]; then
          gh pr comment ${{ github.event.number }} --body-file build/coverage-comment.md
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/build/test-results/**/*.xml
          **/build/reports/tests/**
        retention-days: 30

    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          build/reports/kover/**
          shared/build/reports/kover/**
          composeApp/build/reports/kover/**
        retention-days: 30

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build Android APK (Debug)
      run: ./gradlew :composeApp:assembleDebug

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: composeApp/build/outputs/apk/debug/*.apk
        retention-days: 30

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build Web Distribution
      run: ./gradlew :composeApp:wasmJsBrowserDistribution

    - name: Upload Web Distribution
      uses: actions/upload-artifact@v4
      with:
        name: web-distribution
        path: composeApp/build/dist/wasmJs/productionExecutable/
        retention-days: 30

  server-build:
    name: Server Build
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build Server JAR
      run: ./gradlew :server:build

    - name: Upload Server JAR
      uses: actions/upload-artifact@v4
      with:
        name: server-jar
        path: server/build/libs/*.jar
        retention-days: 30